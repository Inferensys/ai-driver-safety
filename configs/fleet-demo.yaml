thresholds:
  eye_aspect_ratio: 0.22
  mouth_aspect_ratio: 0.50
  phone_confidence: 0.40
  eye_closed_frames: 6
  drowsy_frames: 30
  yawn_frames: 5
  distracted_frames: 9
vision:
  provider: auto
  fallback_to_haar: true
object_detector:
  enabled: true
  provider: onnx
  model_path: models/driver-objects.onnx
  labels_path: models/driver-objects.labels
runtime:
  alert_cooldown_seconds: 1.5
report:
  unsafe_threshold: 0.40

